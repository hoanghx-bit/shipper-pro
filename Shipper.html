<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipper Pro Ultimate</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        #map { height: 250px; border-radius: 20px; z-index: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            // --- STATE ---
            const [activeTab, setActiveTab] = useState('calc');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('ship_logs') || '[]'));
            const [config, setConfig] = useState(JSON.parse(localStorage.getItem('ship_cfg') || '{"baseKm":3,"basePrice":15000,"extraPrice":5000}'));
            const [distance, setDistance] = useState('');
            const [customer, setCustomer] = useState('');
            const [points, setPoints] = useState([]);
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            // --- LƯU TRỮ ---
            useEffect(() => {
                localStorage.setItem('ship_logs', JSON.stringify(history));
                localStorage.setItem('ship_cfg', JSON.stringify(config));
            }, [history, config]);

            // --- BẢN ĐỒ ---
            useEffect(() => {
                if (activeTab === 'calc' && !mapRef.current) {
                    mapRef.current = L.map('map').setView([10.7626, 106.6601], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                    
                    mapRef.current.on('click', (e) => {
                        setPoints(prev => {
                            const newPoints = prev.length >= 2 ? [e.latlng] : [...prev, e.latlng];
                            return newPoints;
                        });
                    });
                }
            }, [activeTab]);

            useEffect(() => {
                if (!mapRef.current) return;
                markersRef.current.forEach(m => mapRef.current.removeLayer(m));
                markersRef.current = points.map(p => L.marker(p).addTo(mapRef.current));
                
                if (points.length === 2) {
                    const d = mapRef.current.distance(points[0], points[1]) / 1000;
                    setDistance((d * 1.2).toFixed(1)); // Cộng 20% trừ hao đường vòng
                }
            }, [points]);

            // --- LOGIC ---
            const fee = useMemo(() => {
                const d = parseFloat(distance) || 0;
                return d <= config.baseKm ? config.basePrice : config.basePrice + Math.ceil(d - config.baseKm) * config.extraPrice;
            }, [distance, config]);

            const saveOrder = () => {
                if (!distance) return;
                const newOrder = { id: Date.now(), customer: customer || 'Khách lẻ', distance, fee, date: new Date().toLocaleDateString('vi-VN') };
                setHistory([newOrder, ...history]);
                setDistance(''); setCustomer(''); setPoints([]);
                alert("Đã lưu thành công!");
            };

            const shareZalo = () => {
                const msg = `Chào bạn, phí ship là ${fee.toLocaleString()}đ (${distance}km).`;
                window.open(`https://zalo.me/0?text=${encodeURIComponent(msg)}`);
            };

            const deleteHistory = (id) => {
                if(confirm("Xóa đơn này?")) setHistory(history.filter(h => h.id !== id));
            };

            // --- UI COMPONENTS ---
            const TabButton = ({id, icon, label}) => (
                <div onClick={() => {setActiveTab(id); setIsMenuOpen(false)}} className={`flex items-center space-x-4 p-4 rounded-2xl cursor-pointer transition ${activeTab === id ? 'bg-blue-600 text-white' : 'hover:bg-gray-800 text-gray-400'}`}>
                    <i data-lucide={icon}></i>
                    <span className="font-bold">{label}</span>
                </div>
            );

            useEffect(() => { lucide.createIcons(); }, [activeTab, isMenuOpen]);

            return (
                <div className="min-h-screen bg-black text-white font-sans overflow-x-hidden">
                    {/* Sidebar Overlay */}
                    {isMenuOpen && <div className="fixed inset-0 bg-black/60 z-40" onClick={() => setIsMenuOpen(false)} />}
                    
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 w-72 bg-gray-900 z-50 transform ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300 p-6`}>
                        <h2 className="text-2xl font-black text-blue-500 mb-8 tracking-tighter italic">SHIPPER PRO</h2>
                        <nav className="space-y-2">
                            <TabButton id="calc" icon="calculator" label="Máy tính phí" />
                            <TabButton id="history" icon="history" label="Lịch sử đơn" />
                            <TabButton id="stats" icon="bar-chart-2" label="Thống kê" />
                            <TabButton id="settings" icon="settings" label="Cấu hình giá" />
                        </nav>
                    </aside>

                    {/* Header */}
                    <header className="p-4 flex items-center justify-between border-b border-gray-800 bg-black sticky top-0 z-30">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2 bg-gray-900 rounded-xl"><i data-lucide="menu"></i></button>
                        <h1 className="font-bold text-blue-500 uppercase">
                            {activeTab === 'calc' ? 'Tính Tiền' : activeTab === 'history' ? 'Lịch Sử' : activeTab === 'stats' ? 'Báo Cáo' : 'Cài Đặt'}
                        </h1>
                        <div className="w-10"></div>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {activeTab === 'calc' && (
                            <div className="space-y-4">
                                <div id="map" className="border-2 border-blue-500/20 shadow-lg shadow-blue-500/10"></div>
                                <div className="bg-gray-900 p-6 rounded-[2.5rem] space-y-4">
                                    <input type="text" placeholder="Tên khách hàng..." value={customer} onChange={e => setCustomer(e.target.value)} className="w-full bg-gray-800 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500" />
                                    <div className="flex items-center space-x-2">
                                        <input type="number" placeholder="Số km" value={distance} onChange={e => setDistance(e.target.value)} className="flex-1 bg-gray-800 border-none rounded-2xl p-4 text-2xl font-bold text-blue-400 outline-none" />
                                        <span className="font-bold text-gray-500">KM</span>
                                    </div>
                                    <div className="text-center py-4 bg-blue-600/10 rounded-3xl border border-blue-500/20">
                                        <p className="text-xs uppercase text-gray-400 font-bold">Thành tiền</p>
                                        <p className="text-4xl font-black text-blue-500">{fee.toLocaleString()}đ</p>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={saveOrder} className="flex-1 bg-blue-600 py-4 rounded-2xl font-black text-lg active:scale-95 transition">LƯU ĐƠN</button>
                                        <button onClick={shareZalo} className="bg-green-600 p-4 rounded-2xl active:scale-95"><i data-lucide="share-2"></i></button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3 custom-scrollbar">
                                {history.length === 0 && <p className="text-center text-gray-500 mt-20">Chưa có dữ liệu</p>}
                                {history.map(item => (
                                    <div key={item.id} className="bg-gray-900 p-4 rounded-2xl flex justify-between items-center border border-gray-800">
                                        <div>
                                            <p className="font-bold">{item.customer}</p>
                                            <p className="text-xs text-gray-500">{item.date} • {item.distance}km</p>
                                        </div>
                                        <div className="flex items-center space-x-4">
                                            <span className="font-black text-blue-500">{item.fee.toLocaleString()}đ</span>
                                            <button onClick={() => deleteHistory(item.id)} className="text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-6">
                                <div className="bg-blue-600 p-8 rounded-[2.5rem] shadow-xl shadow-blue-900/20">
                                    <p className="text-sm font-bold opacity-80 uppercase tracking-widest">Tổng thu nhập</p>
                                    <p className="text-5xl font-black mt-2">{history.reduce((a,b)=>a+b.fee, 0).toLocaleString()}đ</p>
                                    <p className="text-sm mt-4 font-bold bg-white/20 inline-block px-3 py-1 rounded-full">Tổng: {history.length} đơn hàng</p>
                                </div>
                                <div className="bg-gray-900 p-6 rounded-[2.5rem] border border-gray-800">
                                    <h3 className="font-bold mb-4">Giao dịch gần đây</h3>
                                    <div className="space-y-4">
                                        {history.slice(0, 5).map(h => (
                                            <div key={h.id} className="flex justify-between items-center text-sm border-b border-gray-800 pb-2">
                                                <span className="text-gray-400">{h.date}</span>
                                                <span className="font-bold">+{h.fee.toLocaleString()}đ</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="bg-gray-900 p-6 rounded-[2.5rem] space-y-6 border border-gray-800">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">3km đầu tiên (VNĐ)</label>
                                    <input type="number" value={config.basePrice} onChange={e => setConfig({...config, basePrice: parseInt(e.target.value)})} className="w-full bg-gray-800 border-none rounded-xl p-4 mt-1 outline-none font-bold" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Giá mỗi km tiếp theo (VNĐ)</label>
                                    <input type="number" value={config.extraPrice} onChange={e => setConfig({...config, extraPrice: parseInt(e.target.value)})} className="w-full bg-gray-800 border-none rounded-xl p-4 mt-1 outline-none font-bold" />
                                </div>
                                <div className="pt-4">
                                    <p className="text-[10px] text-gray-500 italic text-center italic">Dữ liệu được lưu tự động trên trình duyệt này.</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav cho Mobile */}
                    <nav className="fixed bottom-0 inset-x-0 bg-black/80 backdrop-blur-md border-t border-gray-800 flex justify-around p-2 z-30 lg:hidden">
                        <button onClick={()=>setActiveTab('calc')} className={`p-3 rounded-xl ${activeTab==='calc'?'text-blue-500 bg-blue-500/10':'text-gray-500'}`}><i data-lucide="calculator"></i></button>
                        <button onClick={()=>setActiveTab('history')} className={`p-3 rounded-xl ${activeTab==='history'?'text-blue-500 bg-blue-500/10':'text-gray-500'}`}><i data-lucide="history"></i></button>
                        <button onClick={()=>setActiveTab('stats')} className={`p-3 rounded-xl ${activeTab==='stats'?'text-blue-500 bg-blue-500/10':'text-gray-500'}`}><i data-lucide="bar-chart-2"></i></button>
                        <button onClick={()=>setActiveTab('settings')} className={`p-3 rounded-xl ${activeTab==='settings'?'text-blue-500 bg-blue-500/10':'text-gray-500'}`}><i data-lucide="settings"></i></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
