<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFAST - Quản lý vận chuyển</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #007bff; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .summary-box { background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
        .status-debt { color: red; font-weight: bold; }
        .status-paid { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>UNIFAST - Đặt đơn</h2>
    <div class="card">
        <input type="text" id="custName" placeholder="Tên khách hàng">
        <input type="number" id="distance" placeholder="Nhập quãng đường (km)">
        <input type="number" id="cod" placeholder="Tiền thu hộ (COD)">
        <button onclick="saveOrder()">Lưu đơn hàng</button>
    </div>

    <h2>Báo cáo & Ghi nợ</h2>
    <div class="card">
        <input type="text" id="filter" placeholder="Tìm kiếm theo tên khách..." oninput="renderOrders()">
        <div id="stats" class="summary-box"></div>
        <table id="table">
            <thead><tr><th>Khách</th><th>Phí/COD</th><th>TT</th><th>Xóa</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    let orders = JSON.parse(localStorage.getItem('orders')) || [];

    function saveOrder() {
        const name = document.getElementById('custName').value;
        const dist = parseFloat(document.getElementById('distance').value);
        const cod = parseFloat(document.getElementById('cod').value);
        
        if(!name || !dist) return alert("Vui lòng nhập đầy đủ");

        // Công thức: 10k + 5k/km sau 2km, nhân hệ số 1.2
        const realDist = dist * 1.2;
        let fee = 10000;
        if (realDist > 2) fee += (realDist - 2) * 5000;

        const order = { id: Date.now(), name, fee, cod, status: 'Nợ' };
        orders.push(order);
        localStorage.setItem('orders', JSON.stringify(orders));
        renderOrders();
    }

    function renderOrders() {
        const keyword = document.getElementById('filter').value.toLowerCase();
        const tbody = document.querySelector('#table tbody');
        tbody.innerHTML = '';
        let totalFee = 0, totalCod = 0;

        orders.filter(o => o.name.toLowerCase().includes(keyword)).forEach(o => {
            tbody.innerHTML += `<tr>
                <td>${o.name}</td>
                <td>${o.fee.toLocaleString()} / ${o.cod.toLocaleString()}</td>
                <td class="${o.status === 'Nợ' ? 'status-debt' : 'status-paid'}" onclick="toggleStatus(${o.id})">${o.status}</td>
                <td><button style="background:red; padding:5px" onclick="deleteOrder(${o.id})">X</button></td>
            </tr>`;
            if(o.status === 'Nợ') { totalFee += o.fee; totalCod += o.cod; }
        });
        document.getElementById('stats').innerHTML = `Tổng còn nợ: <b>${totalFee.toLocaleString()}đ</b> phí / <b>${totalCod.toLocaleString()}đ</b> COD`;
    }

    function toggleStatus(id) {
        orders = orders.map(o => o.id === id ? {...o, status: o.status === 'Nợ' ? 'Đã thu' : 'Nợ'} : o);
        localStorage.setItem('orders', JSON.stringify(orders));
        renderOrders();
    }

    function deleteOrder(id) {
        orders = orders.filter(o => o.id !== id);
        localStorage.setItem('orders', JSON.stringify(orders));
        renderOrders();
    }

    renderOrders();
</script>
</body>
</html>
