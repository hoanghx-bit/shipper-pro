<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPPER PRO V5</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #3b82f6; --bg: #000000; --card: #161b22; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        
        header { padding: 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-weight: 900; color: var(--primary); font-style: italic; }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        #map { height: 180px; width: 100%; border-radius: 20px; background: #0d1117; margin-bottom: 15px; border: 1px solid #30363d; }

        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #30363d; margin-bottom: 15px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        
        .btn { border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; font-size: 15px; text-transform: uppercase; margin-bottom: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: #238636; color: white; }
        .btn-red { background: #da3633; color: white; }
        .btn-ghost { background: #21262d; color: #8b949e; }

        .stat-grid { display: grid; grid-cols: 2; display: flex; flex-wrap: wrap; gap: 10px; }
        .stat-item { flex: 1; min-width: 45%; background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #30363d; }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--primary); }

        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; border-top: 1px solid #30363d; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #8b949e; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        .price-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .hidden { display: none; }
        canvas { margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHIPPER PRO V5</div>
        <div id="header-status" style="font-size: 11px; color: #8b949e;">Sẵn sàng</div>
    </header>

    <div class="container">
        <div id="tab-order" class="tab-content">
            <div id="map"></div>
            
            <div class="card">
                <div id="idle-view">
                    <input type="text" id="cust-name" placeholder="Tên khách hàng (không bắt buộc)">
                    <p style="font-size: 11px; color: #8b949e; text-align: center;">Bấm Nhận đơn khi bạn ở điểm lấy hàng</p>
                    <button class="btn btn-blue" onclick="processOrder('start')">🔔 Nhận Đơn</button>
                </div>

                <div id="running-view" class="hidden">
                    <div style="text-align: center; margin-bottom: 15px;">
                        <div style="color: orange; font-weight: bold; font-size: 12px; margin-bottom: 5px;">⚡ ĐANG GIAO HÀNG...</div>
                        <h2 id="active-cust" style="margin: 0;">Khách lẻ</h2>
                    </div>
                    <button class="btn btn-green" onclick="processOrder('end')">🏁 Giao Hàng (Kết thúc)</button>
                    <button class="btn btn-ghost" onclick="cancelOrder()">Hủy bỏ đơn</button>
                </div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content hidden">
            <div class="stat-grid">
                <div class="stat-item"><div>Ngày</div><div id="s-day" class="stat-val">0</div></div>
                <div class="stat-item"><div>Tuần</div><div id="s-week" class="stat-val">0</div></div>
                <div class="stat-item"><div>Tháng</div><div id="s-month" class="stat-val">0</div></div>
                <div class="stat-item"><div>Năm</div><div id="s-year" class="stat-val">0</div></div>
            </div>
            <div class="card" style="margin-top:15px;">
                <canvas id="incomeChart"></canvas>
            </div>
            <div id="history-list" style="margin-top: 15px;"></div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="card">
                <h3>Cài đặt mốc phí</h3>
                <div id="pricing-list"></div>
                <button class="btn btn-ghost" onclick="addPriceStep()" style="margin-top:10px;">+ Thêm mốc km</button>
                <button class="btn btn-blue" onclick="savePricing()" style="margin-top:10px;">Lưu cài đặt</button>
                <hr border="0" style="border-top: 1px solid #333; margin: 20px 0;">
                <button class="btn btn-red" onclick="clearData()">Xóa toàn bộ dữ liệu</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab('order', this)">Vận đơn</div>
        <div class="nav-item" onclick="showTab('stats', this)">Thống kê</div>
        <div class="nav-item" onclick="showTab('settings', this)">Cài đặt</div>
    </nav>

    <script>
        let history = JSON.parse(localStorage.getItem('v5_hist') || '[]');
        let pricing = JSON.parse(localStorage.getItem('v5_price') || '[{"km":2,"price":15000},{"km":5,"price":30000},{"km":100,"price":50000}]');
        let current = JSON.parse(localStorage.getItem('v5_curr') || 'null');
        let map, mStart, mEnd, myChart;

        window.onload = () => {
            initMap();
            if(current) showRunning();
            renderPricing();
            updateStats();
        };

        function initMap() {
            try {
                map = L.map('map').setView([10.7626, 106.6601], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            } catch(e) { console.log("Map error"); }
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'stats') { updateStats(); renderHistory(); }
        }

        function processOrder(step) {
            navigator.geolocation.getCurrentPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                if(step === 'start') {
                    current = { 
                        name: document.getElementById('cust-name').value || "Khách lẻ",
                        start: pos,
                        startTime: new Date().getTime()
                    };
                    localStorage.setItem('v5_curr', JSON.stringify(current));
                    showRunning();
                } else {
                    const dist = (L.latLng(current.start).distanceTo(L.latLng(pos)) / 1000 * 1.2).toFixed(1);
                    const fee = calculateFee(dist);
                    const order = {
                        ...current,
                        dist: dist,
                        fee: fee,
                        date: new Date().toLocaleDateString('vi-VN'),
                        timestamp: new Date().getTime()
                    };
                    history.unshift(order);
                    localStorage.setItem('v5_hist', JSON.stringify(history));
                    localStorage.removeItem('v5_curr');
                    current = null;
                    alert(`Giao xong! ${dist}km - ${fee.toLocaleString()}đ`);
                    location.reload();
                }
            }, () => alert("Lỗi GPS. Hãy bật vị trí."));
        }

        function calculateFee(d) {
            let sorted = pricing.sort((a,b) => a.km - b.km);
            for(let p of sorted) {
                if(d <= p.km) return p.price;
            }
            return sorted[sorted.length - 1].price;
        }

        function showRunning() {
            document.getElementById('idle-view').classList.add('hidden');
            document.getElementById('running-view').classList.remove('hidden');
            document.getElementById('active-cust').innerText = current.name;
            document.getElementById('header-status').innerText = "Đang giao hàng...";
        }

        function cancelOrder() {
            if(confirm("Hủy đơn này?")) {
                localStorage.removeItem('v5_curr');
                location.reload();
            }
        }

        function updateStats() {
            const now = new Date();
            const getSum = (filterFn) => history.filter(filterFn).reduce((a,b) => a + b.fee, 0);

            document.getElementById('s-day').innerText = getSum(h => h.date === now.toLocaleDateString('vi-VN')).toLocaleString() + 'đ';
            document.getElementById('s-month').innerText = getSum(h => new Date(h.timestamp).getMonth() === now.getMonth()).toLocaleString() + 'đ';
            document.getElementById('s-year').innerText = getSum(h => new Date(h.timestamp).getFullYear() === now.getFullYear()).toLocaleString() + 'đ';
            
            // Vẽ biểu đồ
            const ctx = document.getElementById('incomeChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            let days = [];
            let totals = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dStr = d.toLocaleDateString('vi-VN');
                days.push(dStr.split('/')[0] + '/' + dStr.split('/')[1]);
                totals.push(history.filter(h => h.date === dStr).reduce((a,b) => a + b.fee, 0));
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: days,
                    datasets: [{ label: 'Thu nhập 7 ngày', data: totals, backgroundColor: '#3b82f6' }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.slice(0,10).map(h => `
                <div style="background:#161b22; padding:12px; border-radius:15px; margin-bottom:8px; border:1px solid #333; display:flex; justify-content:space-between;">
                    <div><b style="font-size:13px">${h.name}</b><br><small style="color:#666">${h.date} - ${h.dist}km</small></div>
                    <div style="color:#3b82f6; font-weight:bold">${h.fee.toLocaleString()}đ</div>
                </div>
            `).join('');
        }

        function renderPricing() {
            const list = document.getElementById('pricing-list');
            list.innerHTML = pricing.map((p, i) => `
                <div class="price-row">
                    <input type="number" placeholder="Dưới...km" value="${p.km}" onchange="updatePriceVal(${i}, 'km', this.value)">
                    <input type="number" placeholder="Giá tiền" value="${p.price}" onchange="updatePriceVal(${i}, 'price', this.value)">
                    <button onclick="removePriceStep(${i})" style="background:none; border:none; color:red;">X</button>
                </div>
            `).join('');
        }

        function addPriceStep() { pricing.push({km: 0, price: 0}); renderPricing(); }
        function removePriceStep(i) { pricing.splice(i, 1); renderPricing(); }
        function updatePriceVal(i, key, val) { pricing[i][key] = parseFloat(val); }
        function savePricing() { localStorage.setItem('v5_price', JSON.stringify(pricing)); alert("Đã lưu giá mới!"); }
        function clearData() { if(confirm("Xóa hết?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
