<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Tính Tiền Lộ Trình</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }
        h2 { font-size: 1.25rem; margin-top: 0; margin-bottom: 16px; text-align: center;}
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 4px; }
        input {
            width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px;
            box-sizing: border-box; font-size: 1rem;
        }
        .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; margin-top: 16px;
        }
        .stat-box { background: #e0e7ff; padding: 12px; border-radius: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer; color: white;
            margin-bottom: 8px; transition: opacity 0.2s;
        }
        .btn-start { background-color: #10b981; }
        .btn-stop { background-color: #ef4444; }
        .btn-drop { background-color: #f59e0b; }
        #logArea { font-size: 0.8rem; color: #6b7280; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Cấu Hình Giá Tiền</h2>
        <div class="form-group">
            <label>Mốc km đầu tiên (km):</label>
            <input type="number" id="baseKm" value="2" step="0.1">
        </div>
        <div class="form-group">
            <label>Giá mốc km đầu (VNĐ):</label>
            <input type="number" id="basePrice" value="15000" step="1000">
        </div>
        <div class="form-group">
            <label>Giá mỗi km tiếp theo (VNĐ/km):</label>
            <input type="number" id="extraPrice" value="5000" step="1000">
        </div>
    </div>

    <div class="card">
        <h2>Hành Trình Giao Hàng</h2>
        <button id="btnStart" class="btn-start" onclick="startTracking()">Nhận Hàng (Bắt Đầu)</button>
        <button id="btnDrop" class="btn-drop" onclick="markDropOff()" style="display: none;">Đã đến Điểm Giao (Tối đa 3)</button>
        <button id="btnStop" class="btn-stop" onclick="stopTracking()" style="display: none;">Kết Thúc Lộ Trình</button>
        
        <div class="stats">
            <div class="stat-box">
                <div style="font-size: 0.8rem;">Quãng Đường</div>
                <div class="stat-value"><span id="totalDistance">0.00</span> km</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.8rem;">Tổng Tiền</div>
                <div class="stat-value"><span id="totalFare">0</span> đ</div>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Lịch sử mốc thời gian:</label>
        <div id="logArea">Chưa có dữ liệu...</div>
    </div>
</div>

<script>
    let watchId = null;
    let totalDistanceKm = 0;
    let lastPosition = null;
    let dropOffCount = 0;
    
    // Tọa độ dự phòng nếu cần test offline (Khu vực Đông Hà, Quảng Trị)
    const fallbackLat = 16.8167; 
    const fallbackLng = 107.1000;

    const domDistance = document.getElementById('totalDistance');
    const domFare = document.getElementById('totalFare');
    const logArea = document.getElementById('logArea');

    function logMessage(msg) {
        const time = new Date().toLocaleTimeString('vi-VN');
        logArea.innerHTML = `[${time}] ${msg}<br>` + logArea.innerHTML;
    }

    // Thuật toán Haversine tính khoảng cách (đường chim bay giữa 2 điểm GPS cập nhật liên tục)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Bán kính trái đất (km)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; // Trả về km
    }

    function calculateFare() {
        const baseKm = parseFloat(document.getElementById('baseKm').value);
        const basePrice = parseFloat(document.getElementById('basePrice').value);
        const extraPrice = parseFloat(document.getElementById('extraPrice').value);

        let fare = 0;
        if (totalDistanceKm === 0) {
            fare = 0;
        } else if (totalDistanceKm <= baseKm) {
            fare = basePrice;
        } else {
            fare = basePrice + (totalDistanceKm - baseKm) * extraPrice;
        }
        
        domFare.innerText = Math.round(fare).toLocaleString('vi-VN');
    }

    function updatePosition(position) {
        const currentPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
        };

        if (lastPosition) {
            const dist = calculateDistance(lastPosition.lat, lastPosition.lng, currentPos.lat, currentPos.lng);
            // Chỉ cộng dồn nếu di chuyển > 5 mét để tránh nhiễu sóng GPS
            if (dist > 0.005) { 
                totalDistanceKm += dist;
                domDistance.innerText = totalDistanceKm.toFixed(2);
                calculateFare();
                lastPosition = currentPos;
            }
        } else {
            lastPosition = currentPos; // Điểm nhận hàng đầu tiên
        }
    }

    function startTracking() {
        if (!navigator.geolocation) {
            alert("Trình duyệt của bạn không hỗ trợ GPS!");
            return;
        }

        totalDistanceKm = 0;
        lastPosition = null;
        dropOffCount = 0;
        domDistance.innerText = "0.00";
        domFare.innerText = "0";
        logArea.innerHTML = "";

        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnDrop').style.display = 'block';
        document.getElementById('btnStop').style.display = 'block';

        logMessage("📍 Đã lấy 1 mốc nhận hàng. Bắt đầu di chuyển...");

        // Theo dõi GPS liên tục
        watchId = navigator.geolocation.watchPosition(
            updatePosition, 
            (error) => { logMessage("⚠️ Lỗi GPS: " + error.message); },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    function markDropOff() {
        if (dropOffCount < 3) {
            dropOffCount++;
            logMessage(`✅ Đã giao hàng tại Điểm đến ${dropOffCount} - Quãng đường hiện tại: ${totalDistanceKm.toFixed(2)} km`);
            if (dropOffCount === 3) {
                document.getElementById('btnDrop').style.display = 'none';
                logMessage("Đã đạt giới hạn 3 điểm đến.");
            }
        }
    }

    function stopTracking() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        document.getElementById('btnStart').style.display = 'block';
        document.getElementById('btnStart').innerText = "Bắt Đầu Cuốc Mới";
        document.getElementById('btnDrop').style.display = 'none';
        document.getElementById('btnStop').style.display = 'none';
        
        logMessage(`🏁 Đã kết thúc lộ trình. Tổng: ${totalDistanceKm.toFixed(2)} km.`);
    }
</script>
</body>
</html>
