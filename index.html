<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shipper Pro V3 - Professional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 220px; width: 100%; border-radius: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .active-tab { color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1); border-radius: 15px; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .glass-card { background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; border-radius: 24px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

        const App = () => {
            const [activeTab, setActiveTab] = useState('order');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('shipper_v3_history') || '[]'));
            const [pricing, setPricing] = useState(() => JSON.parse(localStorage.getItem('shipper_v3_price') || '[{"from":0,"to":3,"price":15000},{"from":3,"to":10,"price":5000}]'));
            const [currentOrder, setCurrentOrder] = useState(() => JSON.parse(localStorage.getItem('shipper_v3_current') || 'null'));
            const [distance, setDistance] = useState(0);
            const [customer, setCustomer] = useState('');
            const mapRef = useRef(null);

            // Lưu dữ liệu
            useEffect(() => {
                localStorage.setItem('shipper_v3_history', JSON.stringify(history));
                localStorage.setItem('shipper_v3_price', JSON.stringify(pricing));
                localStorage.setItem('shipper_v3_current', JSON.stringify(currentOrder));
            }, [history, pricing, currentOrder]);

            // Khởi tạo bản đồ sau khi giao diện load
            useEffect(() => {
                if (activeTab === 'order' && !mapRef.current) {
                    setTimeout(() => {
                        mapRef.current = L.map('map').setView([10.7626, 106.6601], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                        mapRef.current.on('click', (e) => {
                            // Chức năng chọn nhanh km bằng cách click bản đồ (giả lập)
                            const randomKm = (Math.random() * 5 + 1).toFixed(1);
                            setDistance(parseFloat(randomKm));
                        });
                    }, 500);
                }
            }, [activeTab]);

            const fee = useMemo(() => {
                const d = parseFloat(distance) || 0;
                const base = pricing[0];
                if (d <= base.to) return base.price;
                return base.price + Math.ceil(d - base.to) * pricing[1].price;
            }, [distance, pricing]);

            const handleOrder = () => {
                if (!currentOrder) {
                    if (distance <= 0) return alert("Vui lòng nhập số km!");
                    setCurrentOrder({ id: Date.now(), customer: customer || 'Khách lẻ', distance, fee, date: new Date().toLocaleDateString('vi-VN') });
                } else {
                    setHistory([currentOrder, ...history]);
                    setCurrentOrder(null);
                    setDistance(0); setCustomer('');
                    alert("Đã hoàn thành đơn hàng!");
                }
            };

            return (
                <div className="flex flex-col min-h-screen max-w-md mx-auto relative">
                    {/* Header */}
                    <header className="p-4 flex items-center justify-between sticky top-0 bg-black z-40 border-b border-gray-800">
                        <button onClick={() => setIsMenuOpen(true)} className="w-10 h-10 flex items-center justify-center bg-gray-900 rounded-xl">
                            <i className="fa-solid fa-bars text-blue-500"></i>
                        </button>
                        <h1 className="font-black italic tracking-tighter text-blue-500 text-xl">SHIPPER PRO</h1>
                        <div className="w-10"></div>
                    </header>

                    {/* Menu trượt */}
                    <div className={`fixed inset-0 bg-black/80 z-50 transition-opacity ${isMenuOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsMenuOpen(false)}>
                        <aside className={`w-64 h-full bg-gray-900 p-6 transform transition-transform ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="flex justify-between mb-8">
                                <span className="font-bold text-blue-500">MENU</span>
                                <i className="fa-solid fa-xmark"></i>
                            </div>
                            <nav className="space-y-4">
                                <div onClick={() => setActiveTab('order')} className={`p-3 flex items-center gap-3 ${activeTab === 'order' ? 'text-blue-500' : ''}`}>
                                    <i className="fa-solid fa-motorcycle"></i> Vận đơn
                                </div>
                                <div onClick={() => setActiveTab('history')} className={`p-3 flex items-center gap-3 ${activeTab === 'history' ? 'text-blue-500' : ''}`}>
                                    <i className="fa-solid fa-clock-rotate-left"></i> Lịch sử
                                </div>
                                <div onClick={() => setActiveTab('stats')} className={`p-3 flex items-center gap-3 ${activeTab === 'stats' ? 'text-blue-500' : ''}`}>
                                    <i className="fa-solid fa-chart-line"></i> Thống kê
                                </div>
                                <div onClick={() => setActiveTab('settings')} className={`p-3 flex items-center gap-3 ${activeTab === 'settings' ? 'text-blue-500' : ''}`}>
                                    <i className="fa-solid fa-gears"></i> Cài đặt giá
                                </div>
                            </nav>
                        </aside>
                    </div>

                    {/* Content */}
                    <main className="p-4 flex-1 overflow-y-auto pb-24">
                        {activeTab === 'order' && (
                            <div className="animate-in fade-in duration-500">
                                <div id="map"></div>
                                <div className="glass-card p-6 space-y-4">
                                    {!currentOrder ? (
                                        <>
                                            <input type="text" placeholder="Tên khách hàng..." value={customer} onChange={e => setCustomer(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl p-4 outline-none text-white focus:ring-1 focus:ring-blue-500" />
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="text-[10px] text-gray-500 font-bold uppercase ml-2">Số km</label>
                                                    <input type="number" value={distance} onChange={e => setDistance(e.target.value)} className="w-full bg-gray-800 border-none rounded-xl p-4 text-2xl font-black text-blue-400 outline-none" />
                                                </div>
                                                <div className="flex-1 text-right">
                                                    <label className="text-[10px] text-gray-500 font-bold uppercase mr-2">Phí ship</label>
                                                    <div className="text-2xl font-black p-4">{fee.toLocaleString()}đ</div>
                                                </div>
                                            </div>
                                            <button onClick={handleOrder} className="w-full bg-blue-600 p-5 rounded-2xl font-black text-lg active:scale-95 transition-transform uppercase shadow-lg shadow-blue-900/30">Nhận Đơn</button>
                                        </>
                                    ) : (
                                        <div className="text-center py-4 space-y-6">
                                            <div className="text-yellow-500 font-bold animate-pulse"><i className="fa-solid fa-truck-fast mr-2"></i> ĐANG GIAO HÀNG...</div>
                                            <div>
                                                <div className="text-2xl font-black">{currentOrder.customer}</div>
                                                <div className="text-gray-400">{currentOrder.distance} km - {currentOrder.fee.toLocaleString()}đ</div>
                                            </div>
                                            <button onClick={handleOrder} className="w-full bg-green-600 p-5 rounded-2xl font-black text-lg active:scale-95 transition-transform uppercase shadow-lg shadow-green-900/30">Kết Thúc Đơn</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3">
                                {history.length === 0 && <p className="text-center text-gray-600 mt-20">Chưa có lịch sử</p>}
                                {history.map(h => (
                                    <div key={h.id} className="glass-card p-4 flex justify-between items-center">
                                        <div>
                                            <div className="font-bold">{h.customer}</div>
                                            <div className="text-[10px] text-gray-500">{h.date} • {h.distance}km</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="font-black text-blue-500">{h.fee.toLocaleString()}đ</div>
                                            <button onClick={() => setHistory(history.filter(x => x.id !== h.id))} className="text-red-900 text-xs mt-1">Xóa</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-6">
                                <div className="glass-card p-6 h-64">
                                    <h3 className="text-xs font-bold text-gray-500 mb-4">DOANH THU 7 NGÀY GẦN NHẤT</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={history.slice(0, 7).reverse().map(h => ({ name: h.date.split('/')[0], total: h.fee }))}>
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} fontSize={10} tick={{fill: '#666'}} />
                                            <Bar dataKey="total" fill="#3b82f6" radius={[5, 5, 5, 5]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-card p-6 bg-blue-600/10 border-blue-900">
                                        <div className="text-[10px] text-gray-400 font-bold">TỔNG THU</div>
                                        <div className="text-xl font-black">{history.reduce((a, b) => a + b.fee, 0).toLocaleString()}đ</div>
                                    </div>
                                    <div className="glass-card p-6">
                                        <div className="text-[10px] text-gray-400 font-bold">TỔNG ĐƠN</div>
                                        <div className="text-xl font-black">{history.length}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="glass-card p-6 space-y-6">
                                <h3 className="font-bold text-blue-500 border-b border-gray-800 pb-2 italic">CÀI ĐẶT MỐC GIÁ</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-gray-500 font-bold ml-1 uppercase">Giá 3km đầu (VNĐ)</label>
                                        <input type="number" value={pricing[0].price} onChange={e => {
                                            const newP = [...pricing]; newP[0].price = parseInt(e.target.value); setPricing(newP);
                                        }} className="w-full bg-gray-800 border-none rounded-xl p-4 mt-1 font-black" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-gray-500 font-bold ml-1 uppercase">Giá km tiếp theo (VNĐ)</label>
                                        <input type="number" value={pricing[1].price} onChange={e => {
                                            const newP = [...pricing]; newP[1].price = parseInt(e.target.value); setPricing(newP);
                                        }} className="w-full bg-gray-800 border-none rounded-xl p-4 mt-1 font-black" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 inset-x-0 bg-black/90 backdrop-blur-md border-t border-gray-900 flex justify-around p-2 z-40">
                        <button onClick={() => setActiveTab('order')} className={`p-4 flex-1 ${activeTab === 'order' ? 'text-blue-500' : 'text-gray-600'}`}><i className="fa-solid fa-motorcycle"></i></button>
                        <button onClick={() => setActiveTab('history')} className={`p-4 flex-1 ${activeTab === 'history' ? 'text-blue-500' : 'text-gray-600'}`}><i className="fa-solid fa-clock-rotate-left"></i></button>
                        <button onClick={() => setActiveTab('stats')} className={`p-4 flex-1 ${activeTab === 'stats' ? 'text-blue-500' : 'text-gray-600'}`}><i className="fa-solid fa-chart-line"></i></button>
                        <button onClick={() => setActiveTab('settings')} className={`p-4 flex-1 ${activeTab === 'settings' ? 'text-blue-500' : 'text-gray-600'}`}><i className="fa-solid fa-gears"></i></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
