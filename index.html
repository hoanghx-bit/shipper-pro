<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>App Giao Hàng Pro - Bản Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // --- DỮ LIỆU & LOGIC TRUNG TÂM ---
        let orders = JSON.parse(localStorage.getItem('orders_v4')) || [];
        let config = JSON.parse(localStorage.getItem('config_v4')) || {baseFee: 13000, baseKm: 2, extraFee: 5000, distMult: 1.0};

        function calculateTotal() {
            const dist = parseFloat(document.getElementById('khoang-cach').value) || 0;
            let fee = 0;
            if (dist <= config.baseKm) {
                fee = config.baseFee;
            } else {
                // TÍNH PHÍ TĂNG DẦN THỰC TẾ: Không làm tròn, cộng dồn đúng số KM lẻ
                fee = config.baseFee + ((dist - config.baseKm) * config.extraFee);
            }
            document.getElementById('tong-tien').innerText = Math.round(fee).toLocaleString('vi-VN') + ' đ';
            return Math.round(fee);
        }

        function saveOrder() {
            const newOrder = {
                id: Date.now(),
                name: document.getElementById('ten-khach').value || 'Khách lẻ',
                dist: parseFloat(document.getElementById('khoang-cach').value),
                fee: calculateTotal(),
                cod: parseFloat(document.getElementById('tien-cod').value) || 0,
                isDebt: document.getElementById('is-debt').checked,
                codPaid: false,
                date: new Date().toLocaleDateString()
            };
            orders.push(newOrder);
            localStorage.setItem('orders_v4', JSON.stringify(orders));
            alert("Đã lưu đơn thành công!");
            renderReports();
        }

        function renderReports() {
            const container = document.getElementById('list-container');
            const filter = document.getElementById('search-filter').value.toLowerCase();
            container.innerHTML = '';
            
            orders.filter(o => o.name.toLowerCase().includes(filter)).forEach(o => {
                container.innerHTML += `
                    <div class="p-4 border-b">
                        <p class="font-bold">${o.name}</p>
                        <p>Cước: ${o.fee.toLocaleString()}đ | COD: ${o.cod.toLocaleString()}đ</p>
                        <button onclick="markCodPaid(${o.id})" class="text-xs bg-green-500 text-white p-1 rounded">Xác nhận đã trả COD</button>
                    </div>
                `;
            });
        }

        function markCodPaid(id) {
            orders = orders.map(o => o.id === id ? {...o, codPaid: true} : o);
            localStorage.setItem('orders_v4', JSON.stringify(orders));
            renderReports();
        }

        function updateConfig() {
            config = {
                baseFee: parseFloat(document.getElementById('cfg-base').value),
                baseKm: parseFloat(document.getElementById('cfg-km').value),
                extraFee: parseFloat(document.getElementById('cfg-extra').value),
                distMult: parseFloat(document.getElementById('cfg-mult').value)
            };
            localStorage.setItem('config_v4', JSON.stringify(config));
            alert("Đã cập nhật cấu hình!");
        }
    </script>
</head>
<body class="p-4 bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Lên đơn</h1>
        <input type="text" id="ten-khach" placeholder="Tên khách" class="w-full p-2 border mb-2">
        <input type="number" id="khoang-cach" placeholder="Khoảng cách (km)" oninput="calculateTotal()" class="w-full p-2 border mb-2">
        <input type="number" id="tien-cod" placeholder="Tiền COD" class="w-full p-2 border mb-2">
        <label><input type="checkbox" id="is-debt"> Ghi nợ</label>
        <div class="my-4 text-lg font-bold">Phí: <span id="tong-tien">0 đ</span></div>
        <button onclick="saveOrder()" class="w-full bg-blue-600 text-white p-3 rounded">Lưu Đơn</button>

        <hr class="my-6">
        
        <h2 class="font-bold mb-2">Báo cáo & Tìm kiếm</h2>
        <input type="text" id="search-filter" oninput="renderReports()" placeholder="Lọc theo tên khách..." class="w-full p-2 border mb-2">
        <div id="list-container"></div>
    </div>
</body>
</html>
