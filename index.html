<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Giao Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Ẩn thanh cuộn cho mượt */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 flex justify-center font-sans text-gray-800">

    <div class="w-full max-w-md bg-white shadow-xl h-screen flex flex-col relative overflow-hidden">
        
        <div class="bg-blue-600 p-3 pb-4 rounded-b-xl shadow-md z-10 flex justify-around">
            <button onclick="switchTab('len-don')" id="tab-btn-len-don" class="flex flex-col items-center px-4 py-2 rounded-xl transition-all bg-white text-blue-600 shadow">
                <i class="fa-solid fa-file-invoice text-xl"></i>
                <span class="text-xs mt-1 font-bold">Lên đơn</span>
            </button>
            <button onclick="switchTab('so-no')" id="tab-btn-so-no" class="flex flex-col items-center px-4 py-2 rounded-xl transition-all text-blue-100 hover:bg-blue-500">
                <i class="fa-solid fa-book text-xl"></i>
                <span class="text-xs mt-1 font-bold">Sổ nợ</span>
            </button>
            <button onclick="switchTab('bao-cao')" id="tab-btn-bao-cao" class="flex flex-col items-center px-4 py-2 rounded-xl transition-all text-blue-100 hover:bg-blue-500">
                <i class="fa-solid fa-chart-column text-xl"></i>
                <span class="text-xs mt-1 font-bold">Báo cáo</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
            
            <div id="success-msg" class="hidden bg-green-100 text-green-700 p-3 rounded-lg items-center mb-4 text-sm font-bold">
                <i class="fa-solid fa-circle-check mr-2"></i> Tạo đơn hàng thành công!
            </div>

            <div id="len-don" class="tab-content active space-y-4">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center mb-3">
                        <i class="fa-solid fa-location-dot text-blue-500 mr-3 text-lg"></i>
                        <div class="text-sm text-gray-600">
                            <p class="font-semibold text-gray-800">Điểm lấy hàng mặc định</p>
                            <p>Đông Hà, Quảng Trị</p>
                        </div>
                    </div>
                    <div class="border-t border-gray-100 my-3"></div>
                    <div class="flex items-center">
                        <i class="fa-solid fa-map-location-dot text-red-500 mr-3 text-lg"></i>
                        <input type="text" id="diem-giao" placeholder="Địa chỉ giao..." class="w-full bg-transparent outline-none text-sm font-semibold">
                    </div>
                    <div class="mt-4 flex items-center gap-2 bg-gray-50 p-2 rounded-lg border focus-within:border-blue-300">
                        <span class="text-sm font-semibold whitespace-nowrap text-gray-600">Khoảng cách:</span>
                        <input type="number" id="khoang-cach" placeholder="Số km (VD: 3.5)" oninput="calculateTotal()" class="w-full bg-transparent outline-none text-sm font-bold text-blue-600">
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-4">
                    <div class="flex space-x-2">
                        <div class="flex-1 bg-gray-50 p-2 rounded-lg border focus-within:border-blue-400 flex items-center">
                            <i class="fa-solid fa-user text-gray-400 mr-2"></i>
                            <input type="text" id="ten-khach" placeholder="Tên khách" class="w-full bg-transparent outline-none text-sm font-semibold">
                        </div>
                        <div class="flex-1 bg-gray-50 p-2 rounded-lg border focus-within:border-blue-400 flex items-center">
                            <i class="fa-solid fa-phone text-gray-400 mr-2"></i>
                            <input type="tel" id="sdt-khach" placeholder="Số điện thoại" class="w-full bg-transparent outline-none text-sm font-semibold">
                        </div>
                    </div>

                    <div class="flex justify-between items-center p-3 bg-blue-50 rounded-lg">
                        <span class="font-semibold text-sm text-blue-800">Tiền thu hộ (COD)</span>
                        <input type="number" id="tien-cod" placeholder="0" class="text-right text-blue-700 font-bold outline-none bg-transparent w-1/2 text-lg">
                    </div>

                    <div class="flex justify-between items-center px-1">
                        <span class="font-semibold text-sm text-gray-700">Trạng thái</span>
                        <div class="flex bg-gray-100 rounded-lg p-1">
                            <button id="btn-tien-mat" onclick="setDebt(false)" class="px-3 py-1 text-xs font-bold rounded-md bg-white text-green-600 shadow-sm transition-all">Tiền mặt</button>
                            <button id="btn-ghi-no" onclick="setDebt(true)" class="px-3 py-1 text-xs font-bold rounded-md text-gray-500 transition-all">Ghi nợ</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-2 text-sm">
                    <div class="flex justify-between text-gray-500">
                        <span>Phí vận chuyển</span>
                        <span id="phi-ship">0 đ</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>Phí dịch vụ</span>
                        <span>5.000 đ</span>
                    </div>
                    <div class="border-t border-dashed my-2"></div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-800 text-base">Tổng cộng</span>
                        <span id="tong-tien" class="font-bold text-blue-600 text-xl">5.000 đ</span>
                    </div>
                </div>

                <button onclick="submitOrder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors text-lg">
                    Xác nhận tạo đơn
                </button>
            </div>

            <div id="so-no" class="tab-content">
                <h2 class="text-lg font-bold text-gray-800 mb-4 px-1">Danh sách cần thu nợ</h2>
                <div id="danh-sach-no">
                    </div>
            </div>

            <div id="bao-cao" class="tab-content space-y-4">
                <h2 class="text-lg font-bold text-gray-800 mb-2 px-1">Tổng quan doanh thu</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-600 font-semibold mb-1">Tổng số đơn</p>
                        <p id="bc-tong-don" class="text-2xl font-bold text-blue-800">0</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                        <p class="text-xs text-green-600 font-semibold mb-1">Doanh thu cước</p>
                        <p id="bc-doanh-thu" class="text-xl font-bold text-green-800">0 đ</p>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 col-span-2">
                        <p class="text-xs text-orange-600 font-semibold mb-1">Tổng tiền COD đang giữ</p>
                        <p id="bc-tong-cod" class="text-2xl font-bold text-orange-800">0 đ</p>
                    </div>
                </div>

                <h3 class="font-bold text-gray-800 mt-6 mb-3 px-1">Lịch sử đơn hàng</h3>
                <div id="lich-su-don" class="space-y-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // Khởi tạo dữ liệu từ LocalStorage hoặc dùng dữ liệu mẫu
        let orders = JSON.parse(localStorage.getItem('giao_hang_db')) || [];
        if(orders.length === 0) {
            // Dữ liệu mẫu ban đầu
            orders = [
                { id: 1, date: new Date().toLocaleDateString('vi-VN'), name: 'Chị Nậm', phone: '0987654321', distance: 3.5, cod: 150000, fee: 20500, total: 25500, isDebt: true }
            ];
            saveData();
        }

        let isDebtCurrent = false;

        // 1. CHUYỂN TAB
        function switchTab(tabId) {
            // Ẩn tất cả tab
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // Đổi màu nút
            const btns = ['len-don', 'so-no', 'bao-cao'];
            btns.forEach(btn => {
                const el = document.getElementById('tab-btn-' + btn);
                if(btn === tabId) {
                    el.className = "flex flex-col items-center px-4 py-2 rounded-xl transition-all bg-white text-blue-600 shadow";
                } else {
                    el.className = "flex flex-col items-center px-4 py-2 rounded-xl transition-all text-blue-100 hover:bg-blue-500";
                }
            });

            // Nếu qua tab khác thì render lại dữ liệu
            if(tabId === 'so-no') renderDebtList();
            if(tabId === 'bao-cao') renderReports();
        }

        // 2. CHỌN TRẠNG THÁI NỢ
        function setDebt(status) {
            isDebtCurrent = status;
            const btnTienMat = document.getElementById('btn-tien-mat');
            const btnGhiNo = document.getElementById('btn-ghi-no');
            
            if(status) { // Nếu chọn Ghi nợ
                btnGhiNo.className = "px-3 py-1 text-xs font-bold rounded-md bg-red-500 text-white shadow-sm transition-all";
                btnTienMat.className = "px-3 py-1 text-xs font-bold rounded-md text-gray-500 transition-all";
            } else { // Tiền mặt
                btnTienMat.className = "px-3 py-1 text-xs font-bold rounded-md bg-white text-green-600 shadow-sm transition-all";
                btnGhiNo.className = "px-3 py-1 text-xs font-bold rounded-md text-gray-500 transition-all";
            }
        }

        // 3. TÍNH TOÁN TIỀN SHIP TỰ ĐỘNG
        function calculateTotal() {
            const distance = parseFloat(document.getElementById('khoang-cach').value) || 0;
            let fee = 0;
            
            // Công thức: 2km đầu 13k, các km sau 5k/km
            if (distance > 0) {
                if (distance <= 2) fee = 13000;
                else fee = 13000 + Math.ceil(distance - 2) * 5000;
            }

            const total = fee + 5000; // 5000đ phí dịch vụ mặc định

            document.getElementById('phi-ship').innerText = fee.toLocaleString('vi-VN') + ' đ';
            document.getElementById('tong-tien').innerText = total.toLocaleString('vi-VN') + ' đ';
            return { fee, total };
        }

        // 4. TẠO ĐƠN HÀNG MỚI
        function submitOrder() {
            const distance = parseFloat(document.getElementById('khoang-cach').value) || 0;
            const name = document.getElementById('ten-khach').value.trim();
            const phone = document.getElementById('sdt-khach').value.trim();
            const cod = parseFloat(document.getElementById('tien-cod').value) || 0;

            if(!name || !phone || distance <= 0) {
                alert("Vui lòng nhập Tên khách, Số điện thoại và Khoảng cách km!");
                return;
            }

            const calc = calculateTotal();

            const newOrder = {
                id: Date.now(),
                date: new Date().toLocaleDateString('vi-VN'),
                name: name,
                phone: phone,
                distance: distance,
                cod: cod,
                fee: calc.fee,
                total: calc.total,
                isDebt: isDebtCurrent
            };

            orders.unshift(newOrder); // Thêm lên đầu danh sách
            saveData();

            // Reset form
            document.getElementById('khoang-cach').value = '';
            document.getElementById('diem-giao').value = '';
            document.getElementById('ten-khach').value = '';
            document.getElementById('sdt-khach').value = '';
            document.getElementById('tien-cod').value = '';
            setDebt(false);
            calculateTotal();

            // Hiện thông báo
            const msg = document.getElementById('success-msg');
            msg.classList.remove('hidden');
            msg.classList.add('flex');
            setTimeout(() => { msg.classList.add('hidden'); msg.classList.remove('flex'); }, 3000);
        }

        // 5. RENDER SỔ NỢ GỘP THEO KHÁCH HÀNG
        function renderDebtList() {
            const listDiv = document.getElementById('danh-sach-no');
            listDiv.innerHTML = '';

            // Lọc ra các đơn đang nợ và gộp theo Số điện thoại
            const debts = {};
            orders.forEach(o => {
                if(o.isDebt) {
                    if(!debts[o.phone]) debts[o.phone] = { name: o.name, total: 0, count: 0 };
                    debts[o.phone].total += o.total;
                    debts[o.phone].count += 1;
                }
            });

            if(Object.keys(debts).length === 0) {
                listDiv.innerHTML = '<div class="text-center text-gray-400 py-10">Không có khách hàng nào đang nợ.</div>';
                return;
            }

            for (const phone in debts) {
                const khach = debts[phone];
                listDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border border-red-100">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-gray-800"><i class="fa-solid fa-user text-gray-500 mr-1"></i> ${khach.name}</h3>
                                <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> ${phone}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-red-600 font-bold text-lg">${khach.total.toLocaleString('vi-VN')} đ</div>
                                <div class="text-xs text-gray-400">${khach.count} đơn nợ</div>
                            </div>
                        </div>
                        <button onclick="payDebt('${phone}')" class="w-full py-2 bg-green-50 text-green-700 font-bold text-sm rounded-lg border border-green-200 hover:bg-green-100 transition-colors">
                            Xác nhận đã thu tiền
                        </button>
                    </div>
                `;
            }
        }

        // 6. TRẢ NỢ (Chuyển trạng thái từ Ghi nợ -> Tiền mặt)
        function payDebt(phone) {
            if(confirm("Bạn xác nhận đã thu đủ tiền nợ của khách hàng này?")) {
                orders = orders.map(o => o.phone === phone ? { ...o, isDebt: false } : o);
                saveData();
                renderDebtList(); // Render lại danh sách
            }
        }

        // 7. RENDER BÁO CÁO VÀ LỊCH SỬ
        function renderReports() {
            let sumFee = 0;
            let sumCod = 0;

            orders.forEach(o => {
                sumFee += o.fee;
                sumCod += o.cod;
            });

            document.getElementById('bc-tong-don').innerText = orders.length;
            document.getElementById('bc-doanh-thu').innerText = sumFee.toLocaleString('vi-VN') + ' đ';
            document.getElementById('bc-tong-cod').innerText = sumCod.toLocaleString('vi-VN') + ' đ';

            const historyDiv = document.getElementById('lich-su-don');
            historyDiv.innerHTML = '';
            
            // Hiển thị 10 đơn gần nhất
            orders.slice(0, 10).forEach(o => {
                const statusBadge = o.isDebt 
                    ? '<span class="text-[10px] px-2 py-1 rounded-md font-bold bg-red-100 text-red-600">Ghi nợ</span>'
                    : '<span class="text-[10px] px-2 py-1 rounded-md font-bold bg-green-100 text-green-600">Đã thu</span>';
                
                historyDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${o.name}</p>
                            <p class="text-xs text-gray-500">${o.date} - ${o.distance}km</p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <p class="font-bold text-blue-600 text-sm">${o.total.toLocaleString('vi-VN')} đ</p>
                            ${statusBadge}
                        </div>
                    </div>
                `;
            });
        }

        // LƯU DỮ LIỆU
        function saveData() {
            localStorage.setItem('giao_hang_db', JSON.stringify(orders));
        }
    </script>
</body>
</html>
