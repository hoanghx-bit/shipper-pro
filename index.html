<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIPPER PRO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #3b82f6; --bg: #000000; --card: #161b22; --text: #ffffff; --red: #da3633; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        
        header { padding: 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-blur: 10px; z-index: 1000; }
        .logo { font-weight: 900; color: var(--primary); font-style: italic; }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        #map { height: 250px; width: 100%; border-radius: 20px; background: #0d1117; margin-bottom: 15px; border: 1px solid #30363d; z-index: 1; }

        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #30363d; margin-bottom: 15px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 16px; }
        
        .btn { border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: #238636; color: white; }
        .btn-orange { background: #d29922; color: white; }
        .btn-ghost { background: #21262d; color: #8b949e; }

        /* Search Results */
        #search-results { background: #161b22; border: 1px solid #333; border-radius: 12px; position: absolute; width: calc(100% - 40px); z-index: 2000; max-height: 200px; overflow-y: auto; display: none; margin-top: -10px; }
        .search-item { padding: 12px; border-bottom: 1px solid #333; font-size: 13px; cursor: pointer; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: var(--card); padding: 12px; border-radius: 18px; border: 1px solid #30363d; text-align: center; }
        .stat-label { font-size: 9px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 16px; font-weight: 900; color: var(--primary); }

        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #8b949e; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-top: 2px solid var(--primary); }

        .debt-item { background: #21262d; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #d29922; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SHIPPER PRO</div>
        <div id="today-total" style="font-size: 12px; font-weight: bold; color: #238636;">Hôm nay: 0đ</div>
    </header>

    <div class="container">
        <div id="tab-order" class="tab-content">
            <div id="map"></div>
            
            <div class="card" style="position: relative;">
                <div id="idle-view">
                    <input type="text" id="cust-name" placeholder="Tên khách hàng...">
                    <button class="btn btn-blue" onclick="startOrder()">🚀 Bắt đầu nhận đơn</button>
                </div>

                <div id="running-view" class="hidden">
                    <input type="text" id="search-addr" placeholder="Tìm địa chỉ giao..." oninput="searchAddress(this.value)">
                    <div id="search-results"></div>

                    <div style="text-align: center; margin: 15px 0;">
                        <h2 id="active-cust" style="margin: 0; font-size: 18px;">Khách lẻ</h2>
                        <div id="preview-info" style="color: #8b949e; font-size: 12px; margin-top: 5px;">Chạm bản đồ hoặc tìm địa chỉ</div>
                        <div id="preview-fee" style="font-size: 32px; font-weight: 900; color: var(--primary); margin: 10px 0;">0đ</div>
                    </div>

                    <button class="btn btn-green" id="btn-finish" onclick="completeOrder('cash')" disabled style="opacity: 0.5;">💰 Thu tiền mặt</button>
                    <button class="btn btn-orange" id="btn-debt" onclick="completeOrder('debt')" disabled style="opacity: 0.5;">📝 Ghi nợ khách</button>
                    <button class="btn btn-ghost" onclick="cancelOrder()">Hủy đơn</button>
                </div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content hidden">
            <div class="stat-grid">
                <div class="stat-item"><div class="stat-label">Ngày</div><div id="s-day" class="stat-val">0đ</div></div>
                <div class="stat-item"><div class="stat-label">Tuần</div><div id="s-week" class="stat-val">0đ</div></div>
                <div class="stat-item"><div class="stat-label">Tháng</div><div id="s-month" class="stat-val">0đ</div></div>
                <div class="stat-item"><div class="stat-label">Năm</div><div id="s-year" class="stat-val">0đ</div></div>
            </div>
            <div class="card"><canvas id="incomeChart" height="180"></canvas></div>
            <div id="history-list"></div>
        </div>

        <div id="tab-debt" class="tab-content hidden">
            <h3 style="margin-bottom: 15px;">Danh sách ghi nợ</h3>
            <div id="debt-list"></div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="card">
                <h3>Cài đặt phí</h3>
                <div id="pricing-list"></div>
                <button class="btn btn-ghost" onclick="addPriceStep()">+ Thêm mốc</button>
                <button class="btn btn-blue" onclick="savePricing()">Lưu giá</button>
                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                <button class="btn btn-ghost" style="color: var(--red);" onclick="clearAllData()">Xóa sạch dữ liệu</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab('order', this)">Đơn</div>
        <div class="nav-item" onclick="showTab('stats', this)">Báo cáo</div>
        <div class="nav-item" onclick="showTab('debt', this)">Sổ nợ</div>
        <div class="nav-item" onclick="showTab('settings', this)">Giá</div>
    </nav>

    <script>
        let history = JSON.parse(localStorage.getItem('shipper_history') || '[]');
        let debts = JSON.parse(localStorage.getItem('shipper_debts') || '[]');
        let pricing = JSON.parse(localStorage.getItem('shipper_pricing') || '[{"km":2,"price":15000},{"km":5,"price":30000},{"km":100,"price":50000}]');
        let current = JSON.parse(localStorage.getItem('shipper_current') || 'null');
        let map, mStart, mEnd, myChart;
        let selectedFee = 0, selectedDist = 0;

        window.onload = () => {
            initMap();
            if(current) showRunning();
            renderPricing();
            updateTotalDisplay();
        };

        function initMap() {
            map = L.map('map').setView([10.7626, 106.6601], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', e => { if(current) updateDestination(e.latlng); });
        }

        function showTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'stats') { renderStats(); renderHistory(); }
            if(tab === 'debt') renderDebts();
            if(tab === 'order') setTimeout(() => map.invalidateSize(), 200);
        }

        // --- LOGIC VẬN ĐƠN ---
        function startOrder() {
            navigator.geolocation.getCurrentPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                current = { name: document.getElementById('cust-name').value || "Khách lẻ", start: pos, time: new Date().getTime() };
                localStorage.setItem('shipper_current', JSON.stringify(current));
                if(mStart) map.removeLayer(mStart);
                mStart = L.marker(pos).addTo(map).bindPopup("Điểm nhận").openPopup();
                showRunning();
            }, () => alert("Hãy bật GPS"));
        }

        function showRunning() {
            document.getElementById('idle-view').classList.add('hidden');
            document.getElementById('running-view').classList.remove('hidden');
            document.getElementById('active-cust').innerText = current.name;
            if(current.start) {
                if(!mStart) mStart = L.marker(current.start).addTo(map);
                map.setView(current.start, 15);
            }
        }

        async function searchAddress(query) {
            if(query.length < 3) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5`);
            const data = await res.json();
            const box = document.getElementById('search-results');
            box.innerHTML = data.map(item => `<div class="search-item" onclick="selectAddr(${item.lat}, ${item.lon}, '${item.display_name}')">${item.display_name}</div>`).join('');
            box.style.display = 'block';
        }

        function selectAddr(lat, lon, name) {
            const pos = L.latLng(lat, lon);
            updateDestination(pos);
            map.setView(pos, 15);
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-addr').value = name;
        }

        function updateDestination(latlng) {
            if(mEnd) map.removeLayer(mEnd);
            mEnd = L.marker(latlng).addTo(map);
            selectedDist = (L.latLng(current.start).distanceTo(latlng) / 1000 * 1.2).toFixed(1);
            selectedFee = calculateFee(selectedDist);
            document.getElementById('preview-info').innerText = `${selectedDist} km`;
            document.getElementById('preview-fee').innerText = selectedFee.toLocaleString() + 'đ';
            document.querySelectorAll('#btn-finish, #btn-debt').forEach(b => { b.disabled = false; b.style.opacity = 1; });
        }

        function completeOrder(type) {
            const data = { 
                name: current.name, 
                dist: selectedDist, 
                fee: selectedFee, 
                date: new Date().toLocaleDateString('vi-VN'), 
                timestamp: new Date().getTime() 
            };
            if(type === 'debt') {
                debts.unshift(data);
                localStorage.setItem('shipper_debts', JSON.stringify(debts));
                alert("Đã ghi vào sổ nợ!");
            } else {
                history.unshift(data);
                localStorage.setItem('shipper_history', JSON.stringify(history));
                alert("Đã hoàn thành & nhận tiền!");
            }
            localStorage.removeItem('shipper_current');
            location.reload();
        }

        function calculateFee(d) {
            let sorted = [...pricing].sort((a,b) => a.km - b.km);
            for(let p of sorted) { if(d <= p.km) return p.price; }
            return sorted[sorted.length-1].price;
        }

        // --- QUẢN LÝ NỢ ---
        function renderDebts() {
            const box = document.getElementById('debt-list');
            if(debts.length === 0) { box.innerHTML = '<p style="text-align:center;color:#666;margin-top:20px;">Không có nợ.</p>'; return; }
            box.innerHTML = debts.map((d, i) => `
                <div class="debt-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b>${d.name}</b>
                        <span style="color:#d29922; font-weight:900;">${d.fee.toLocaleString()}đ</span>
                    </div>
                    <div style="font-size:11px; color:#8b949e; margin-bottom:10px;">${d.date} • ${d.dist}km</div>
                    <button class="btn btn-blue" style="padding:8px; font-size:11px;" onclick="payDebt(${i})">Xác nhận đã trả tiền</button>
                </div>
            `).join('');
        }

        function payDebt(index) {
            const item = debts.splice(index, 1)[0];
            history.unshift(item);
            localStorage.setItem('shipper_debts', JSON.stringify(debts));
            localStorage.setItem('shipper_history', JSON.stringify(history));
            alert("Đã trả nợ, tiền đã cộng vào doanh thu!");
            renderDebts();
            updateTotalDisplay();
        }

        // --- THỐNG KÊ ---
        function renderStats() {
            const now = new Date();
            const getSum = (arr, filterFn) => arr.filter(filterFn).reduce((a,b) => a + b.fee, 0);
            
            // Tính theo tuần (từ Thứ 2)
            const Monday = new Date(now);
            Monday.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
            Monday.setHours(0,0,0,0);

            document.getElementById('s-day').innerText = getSum(history, h => h.date === now.toLocaleDateString('vi-VN')).toLocaleString() + 'đ';
            document.getElementById('s-week').innerText = getSum(history, h => h.timestamp >= Monday.getTime()).toLocaleString() + 'đ';
            document.getElementById('s-month').innerText = getSum(history, h => new Date(h.timestamp).getMonth() === now.getMonth()).toLocaleString() + 'đ';
            document.getElementById('s-year').innerText = getSum(history, h => new Date(h.timestamp).getFullYear() === now.getFullYear()).toLocaleString() + 'đ';
            
            const ctx = document.getElementById('incomeChart').getContext('2d');
            if(myChart) myChart.destroy();
            let labels = [], data = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dStr = d.toLocaleDateString('vi-VN');
                labels.push(dStr.split('/')[0] + '/' + dStr.split('/')[1]);
                data.push(getSum(history, h => h.date === dStr));
            }
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: '7 ngày', data: data, backgroundColor: '#3b82f6' }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#333' } } } }
            });
        }

        function renderHistory() {
            const box = document.getElementById('history-list');
            box.innerHTML = '<h4 style="margin:20px 0 10px 0">Đơn đã thu tiền</h4>' + history.slice(0,10).map(h => `
                <div style="background:#0d1117; padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid #333;">
                    <div style="font-size:12px;"><b>${h.name}</b><br><span style="color:#666">${h.date}</span></div>
                    <b style="color:#3b82f6">${h.fee.toLocaleString()}đ</b>
                </div>
            `).join('');
        }

        // --- CÀI ĐẶT ---
        function renderPricing() {
            document.getElementById('pricing-list').innerHTML = pricing.map((p, i) => `
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="number" value="${p.km}" onchange="pricing[${i}].km=parseFloat(this.value)">
                    <input type="number" value="${p.price}" onchange="pricing[${i}].price=parseFloat(this.value)">
                    <button onclick="pricing.splice(${i},1); renderPricing()" style="color:red; background:none; border:none;">X</button>
                </div>
            `).join('');
        }
        function addPriceStep() { pricing.push({km:0, price:0}); renderPricing(); }
        function savePricing() { localStorage.setItem('shipper_pricing', JSON.stringify(pricing)); alert("Đã lưu!"); }
        function updateTotalDisplay() {
            const today = new Date().toLocaleDateString('vi-VN');
            const total = history.filter(h => h.date === today).reduce((a,b) => a + b.fee, 0);
            document.getElementById('today-total').innerText = `Hôm nay: ${total.toLocaleString()}đ`;
        }
        function cancelOrder() { if(confirm("Hủy đơn?")) { localStorage.removeItem('shipper_current'); location.reload(); } }
        function clearAllData() { if(confirm("Xóa sạch hết?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
